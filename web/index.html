<style>
  /* Design tokens taken from the Figma file (Naatiq — Landing Page Hero). */
  :root{
    --navy:#0f1b3d; --blue:#2f5fff; --blue2:#3b6bff; --green:#16c89a;
    --muted:#5b6472; --surface:#f3f5f9; --page:#f8fafc;
    --border:#e7eaef; --border2:#e5e9ef; --dim:#a6adb8;
    --grad:linear-gradient(90deg,var(--blue),var(--blue2));
    --shadow-cta:0 8px 20px rgba(47,95,255,.28);
    --shadow-card:0 30px 60px -10px rgba(15,26,61,.16);
    --shadow-step:0 16px 32px -8px rgba(15,26,61,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Cairo',system-ui,sans-serif;color:var(--navy);background:#fff;
       -webkit-font-smoothing:antialiased}
  .num{font-family:'Inter',sans-serif;font-weight:700}
  a{text-decoration:none;color:inherit}
  .wrap{width:min(1200px,calc(100% - 48px));margin-inline:auto}

  /* ---------- navigation ---------- */
  .nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);
       backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .nav-in{height:88px;display:flex;align-items:center;justify-content:space-between;gap:24px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-mark{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;
    background:linear-gradient(80deg,#0f1b3d 5%,#16c89a 105%);color:#fff;
    font-weight:800;font-size:18px}
  .brand-name{font-weight:800;font-size:20px}
  .nav-links{display:flex;align-items:center;gap:36px;font-size:15px}
  .nav-links a{color:var(--muted);font-weight:500}
  .nav-links a:hover{color:var(--navy)}
  .nav-links a.active{color:var(--navy);font-weight:700}
  .nav-right{display:flex;align-items:center;gap:12px}
  .lang{display:flex;align-items:center;gap:2px;background:var(--surface);
        border-radius:100px;padding:3px}
  .lang button{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
        border:0;background:none;color:var(--muted);padding:7px 16px;border-radius:100px}
  .lang button.on{background:var(--navy);color:#fff}
  .btn{display:inline-flex;align-items:center;justify-content:center;font-family:inherit;
       font-weight:700;cursor:pointer;border-radius:10px;padding:11px 22px;font-size:14px;
       border:1px solid transparent;white-space:nowrap}
  .btn-primary{background:var(--grad);color:#fff;box-shadow:var(--shadow-cta)}
  .btn-ghost{background:#fff;border-color:var(--border2);color:var(--navy);font-weight:600}
  .btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
  .nav-toggle{display:none}

  /* ---------- hero ---------- */
  .hero{background:#fff}
  .hero-row{display:flex;align-items:center;gap:80px;padding:120px 0}
  .hero-col{flex:1 1 560px;min-width:0;display:flex;flex-direction:column;
            align-items:flex-start;gap:24px}
  .badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface);
         border:1px solid var(--border2);border-radius:100px;padding:8px 16px;
         font-size:14px;font-weight:600}
  .badge i{width:8px;height:8px;border-radius:50%;background:var(--green);display:block}
  h1{font-size:56px;font-weight:800;line-height:1.18}
  .lede{font-size:19px;line-height:1.6;color:var(--muted)}
  .cta-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:8px}
  .btn-lg{padding:16px 28px;font-size:16px;border-radius:12px}
  .trust{display:flex;align-items:center;gap:20px;flex-wrap:wrap;font-size:14px}
  .trust span{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:500}
  .trust b{color:var(--green);font-weight:700}

  /* dashboard preview card — wired to live data */
  .mock{flex:1 1 560px;min-width:0}
  .card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:20px;
        box-shadow:var(--shadow-card);display:flex;flex-direction:column;gap:16px}
  .card-top{display:flex;align-items:center;justify-content:space-between}
  .dots{display:flex;gap:6px}
  .dots i{width:9px;height:9px;border-radius:50%;display:block}
  .dots i:nth-child(1){background:#ff5f57}.dots i:nth-child(2){background:#febc2e}
  .dots i:nth-child(3){background:#28c840}
  .card-top span{font-size:13px;font-weight:600;color:var(--muted)}
  .banner{background:linear-gradient(90deg,#081128,#0d3352);border-radius:16px;
          padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .banner p{font-size:13px;font-weight:600;color:#fff;line-height:1.5}
  .banner p span{color:#bfcce5;display:block}
  .banner .big{font-size:44px;color:#fff;line-height:1}
  .stats{display:flex;gap:12px}
  .stat{flex:1;background:var(--surface);border-radius:12px;padding:14px 12px;
        display:flex;flex-direction:column;align-items:center;gap:4px}
  .stat b{font-size:22px;font-weight:800}
  .stat.green b{color:var(--green)}
  .stat small{font-size:11px;font-weight:500;color:var(--muted)}
  .chart{background:var(--surface);border-radius:14px;padding:16px;display:flex;
         flex-direction:column;gap:10px}
  .chart h4{font-size:12px;font-weight:600}
  .bar{height:10px;border-radius:4px;background:var(--blue);min-width:12px}

  /* ---------- how it works ---------- */
  .section{background:var(--page);padding:120px 0}
  .section.alt{background:#fff}
  .head{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;
        margin-bottom:56px}
  .head .badge{background:#fff;border-color:var(--border)}
  .head h2{font-size:40px;font-weight:800;line-height:1.3;max-width:720px}
  .head p{font-size:17px;line-height:1.6;color:var(--muted);max-width:560px}
  .steps{display:flex;align-items:center;gap:16px}
  .step{flex:1 1 0;min-width:0;background:#fff;border:1px solid var(--border);
        border-radius:20px;padding:32px 28px;box-shadow:var(--shadow-step);
        display:flex;flex-direction:column;gap:18px;min-height:320px}
  .step-top{display:flex;align-items:center;justify-content:space-between}
  .step-top em{font-style:normal;font-size:14px;color:var(--dim)}
  .step-ico{width:56px;height:56px;border-radius:14px;display:grid;place-items:center;font-size:26px}
  .step h3{font-size:19px;font-weight:700;line-height:1.32}
  .step p{font-size:14px;line-height:1.65;color:var(--muted)}
  .arrow{color:var(--dim);font-size:18px;font-weight:700;flex:0 0 auto}

  /* ---------- who it's for ---------- */
  .who{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .panel{background:#fff;border:1px solid var(--border);border-radius:20px;padding:28px;
         box-shadow:var(--shadow-step)}
  .panel h3{font-size:19px;font-weight:700;margin-bottom:16px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--surface);border-radius:100px;padding:8px 14px;font-size:14px;
        font-weight:500;color:var(--navy)}

  /* ---------- employers ---------- */
  .emp{background:linear-gradient(90deg,#081128,#0d3352);border-radius:24px;padding:56px;
       display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap}
  .emp h2{color:#fff;font-size:32px;font-weight:800;line-height:1.3;margin-bottom:12px}
  .emp p{color:#bfcce5;font-size:16px;line-height:1.6;max-width:520px}
  .emp .actions{display:flex;gap:12px;flex-wrap:wrap}
  .btn-white{background:#fff;color:var(--navy)}
  .btn-outline{background:transparent;border-color:rgba(255,255,255,.35);color:#fff}

  /* ---------- footer ---------- */
  footer{border-top:1px solid var(--border);padding:40px 0;background:#fff}
  .foot{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .foot p{color:var(--muted);font-size:14px}
  .foot .links{display:flex;gap:24px;font-size:14px}
  .foot .links a{color:var(--muted)}
  .foot .links a:hover{color:var(--navy)}

  @media (max-width:1080px){
    .hero-row{flex-direction:column;gap:48px;padding:72px 0}
    .steps{flex-wrap:wrap}
    .step{flex:1 1 260px}
    .arrow{display:none}
    h1{font-size:40px}
    .head h2{font-size:30px}
    .who{grid-template-columns:1fr}
    .nav-links{display:none}
    .emp{padding:36px}
  }
  @media (max-width:640px){
    h1{font-size:32px}.lede{font-size:17px}
    .section{padding:72px 0}
    .stats{flex-wrap:wrap}.stat{flex:1 1 45%}
  }
</style>
</head>

  // The design sets Arabic-Indic numerals in the Arabic view.

  const digits = (v) => lang === "ar"
    ? String(v).replace(/[0-9]/g, d => AR_DIGITS[+d]) : String(v);

  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };

  function render(){
    const L = T[lang];
    document.documentElement.lang = lang;
    document.documentElement.dir = L.dir;
    document.getElementById("btn-ar").classList.toggle("on", lang === "ar");
    document.getElementById("btn-en").classList.toggle("on", lang === "en");

    ["brand","n1","n2","n3","nemp","ndash","ncta","eyebrow","h1","lede","cta","cta2",
     "tr1","tr2","tr3","cardtitle","bannerA","bannerB","rate","cvs","people","chart",
     "howbadge","howh","hows","whobadge","whoh","whos","candh","jobh","emph","empp",
     "empbtn","dashbtn","foot","f1","f2","f3"].forEach(k => set("t-"+k, L[k]));

    const wa = "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(JOIN_CODE);
    ["t-cta","t-ncta","t-f3"].forEach(id => { const el = document.getElementById(id); if (el) el.href = wa; });

    // live figures
    const cvs = DATA.total_cvs ?? 0, reached = DATA.people_reached ?? 0;
    const profiles = DATA.total_profiles ?? reached;
    const rate = profiles ? Math.round((cvs / profiles) * 100) : 0;
    set("s-hero", cvs);                       // banner stays Latin, as designed
    set("s-rate", digits(rate) + (lang === "ar" ? "٪" : "%"));
    set("s-cvs", digits(cvs));
    set("s-people", digits(reached));

    // Trade distribution. Widths are the real proportions — when every trade has
    // the same count the bars are genuinely equal, which is the honest picture.
    // The trade name is exposed on hover rather than invented into the width.
    const max = Math.max(...BARS.map(b => b.cnt), 1);
    document.getElementById("bars").innerHTML = BARS.slice(0,7)
      .map(b => '<div class="bar" title="' + String(b.role_trade || "").replace(/"/g,"") +
        '" style="width:' + Math.max(6, Math.round((b.cnt / max) * 100)) +
        '%;margin-bottom:10px"></div>').join("");

    // steps — DOM order 01→04; flex direction follows dir, so 01 sits first either way
    document.getElementById("steps").innerHTML = L.steps.map((s, i) =>
      '<div class="step">' +
        '<div class="step-top"><em class="num">' + s.n + '</em>' +
        '<div class="step-ico" style="background:' + s.bg + '">' + s.i + '</div></div>' +
        '<h3>' + s.h + '</h3><p>' + s.p + '</p></div>' +
      (i < L.steps.length - 1 ? '<div class="arrow">' + L.arrow + '</div>' : '')
    ).join("");

    document.getElementById("cands").innerHTML = L.cands.map(c => '<span class="chip">'+c+'</span>').join("");
    document.getElementById("jobs").innerHTML  = L.jobs.map(c => '<span class="chip">'+c+'</span>').join("");
  }

  function setLang(l){ lang = l; render(); }

  async function loadLive(){
    try{
      const [s, t] = await Promise.all([
        fetch(SUPABASE_URL + "/rest/v1/dashboard_stats?select=*", { headers:{ apikey: KEY } }),
        fetch(SUPABASE_URL + "/rest/v1/dashboard_trade_distribution?select=*&order=cnt.desc&limit=7",
              { headers:{ apikey: KEY } })
      ]);
      if (s.ok){ const rows = await s.json(); if (rows[0]) DATA = rows[0]; }
      if (t.ok){ const rows = await t.json(); if (rows.length) BARS = rows; }
      render();
    }catch(e){ /* snapshot already on screen */ }
  }

  render();
  loadLive();
</script>
</body>
</html>
