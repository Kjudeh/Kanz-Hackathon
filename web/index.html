<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ناطق · Naatiq — سيرتك الذاتية بصوتك</title>
<style>
  :root {
    --navy:#001737; --blue:#0E52E5; --emerald:#09A385;
    --ink:#0f1e33; --muted:#5b6b82; --bg:#ffffff; --soft:#f4f7fb;
    --line:#e4eaf1; --chip:#eaf0fb;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body { font-family:'Segoe UI',system-ui,-apple-system,'Tahoma',sans-serif;
         background:var(--bg); color:var(--ink); line-height:1.6; }
  .wrap { max-width:1080px; margin:0 auto; padding:0 20px; }

  /* top bar */
  .nav { display:flex; align-items:center; justify-content:space-between; padding:18px 0; gap:12px; flex-wrap:wrap; }
  .nav .brand { display:flex; align-items:center; gap:10px; }
  .nav .brand img { height:42px; }
  .nav .brand span { font-weight:800; color:var(--navy); font-size:17px; }
  .navlinks { display:flex; gap:10px; align-items:center; }
  .btn { display:inline-block; border-radius:10px; padding:11px 20px; font-weight:700;
         font-size:14px; text-decoration:none; cursor:pointer; border:1px solid transparent; }
  .btn-primary { background:var(--emerald); color:#fff; }
  .btn-primary:hover { background:#07806a; }
  .btn-ghost { background:#fff; color:var(--blue); border-color:var(--blue); }
  .btn-ghost:hover { background:var(--blue); color:#fff; }

  /* hero */
  .hero { background:linear-gradient(135deg,#001737 0%,#0a2a63 55%,#0E52E5 100%);
          color:#fff; border-radius:22px; padding:52px 44px; margin-top:8px;
          position:relative; overflow:hidden; }
  .hero::after { content:""; position:absolute; inset-inline-end:-60px; bottom:-60px;
                 width:260px; height:260px; border-radius:50%;
                 background:radial-gradient(circle,rgba(9,163,133,.5),transparent 70%); }
  .hero-inner { display:flex; align-items:center; gap:44px; flex-wrap:wrap; position:relative; }
  .hero-logo { background:#fff; border-radius:24px; padding:22px 26px; flex:0 0 auto;
               box-shadow:0 12px 34px rgba(0,0,0,.22); }
  .hero-logo img { height:170px; display:block; }
  .hero-text { flex:1; min-width:290px; }
  .hero h1 { font-size:42px; line-height:1.25; margin:0 0 14px; font-weight:800; }
  .hero p.lede { font-size:18px; opacity:.95; margin:0 0 26px; max-width:560px; }
  .cta-row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .wa-number { font-size:15px; opacity:.9; }
  .wa-number b { font-weight:700; letter-spacing:.4px; }

  /* stats */
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin:34px 0 8px; }
  .stat { background:var(--soft); border:1px solid var(--line); border-radius:16px; padding:24px; text-align:center; }
  .stat .n { font-size:44px; font-weight:800; color:var(--navy); line-height:1; }
  .stat:nth-child(2) .n { color:var(--blue); }
  .stat:nth-child(3) .n { color:var(--emerald); }
  .stat .l { color:var(--muted); font-size:13.5px; margin-top:8px; }

  section.block { padding:44px 0 8px; }
  h2.sec { font-size:26px; font-weight:800; color:var(--navy); margin:0 0 8px; }
  p.sub { color:var(--muted); margin:0 0 22px; font-size:15.5px; }

  .steps { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .step { border:1px solid var(--line); border-radius:16px; padding:24px; background:#fff; }
  .step .k { width:34px; height:34px; border-radius:50%; background:var(--chip); color:var(--blue);
             font-weight:800; display:flex; align-items:center; justify-content:center; margin-bottom:12px; }
  .step h3 { margin:0 0 6px; font-size:17px; color:var(--navy); }
  .step p { margin:0; color:var(--muted); font-size:14.5px; }

  .two { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .card { border:1px solid var(--line); border-radius:16px; padding:26px; background:#fff; }
  .card h3 { margin:0 0 12px; font-size:18px; color:var(--navy); }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { background:var(--chip); color:var(--blue); border-radius:20px; padding:6px 14px; font-size:13.5px; font-weight:600; }
  .chip.em { background:#e4f5ef; color:var(--emerald); }

  .employer { background:var(--soft); border:1px solid var(--line); border-radius:20px;
              padding:34px; margin:44px 0; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; }
  .employer h3 { margin:0 0 6px; font-size:21px; color:var(--navy); }
  .employer p { margin:0; color:var(--muted); font-size:15px; max-width:560px; }

  footer { border-top:1px solid var(--line); margin-top:40px; padding:24px 0 46px;
           color:#9aa5b1; font-size:13px; display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  footer b { color:var(--navy); }

  @media (max-width:820px){
    .stats,.steps,.two { grid-template-columns:1fr; }
    .hero { padding:34px 24px; } .hero h1 { font-size:31px; }
    .hero-logo img { height:120px; }
  }
</style>
</head>

      cands:["عاملات منزليات","سائقون","مربّيات أطفال","فنيو صالونات","كهربائيون","سبّاكون","طهاة","عمال توصيل","حراس أمن","بستانيون"],
      jobs:["المنازل والأسر","النقل والتوصيل","الضيافة والمطاعم","الصيانة والمرافق","صالونات التجميل","التجزئة والمستودعات"],
      emph:"هل تبحث عن موظفين؟", empp:"تصفّح العاملين المتاحين واطّلع على سيرهم الذاتية الجاهزة، وتواصل معهم عبر ناطق.",
      empbtn:"تصفّح العاملين",
      foot:"ناطق — سِيَر ذاتية صوتية للعاملين الذين يستحقون أن يُسمعوا." },
    en: { dir:"ltr", lang:"عربي", navemp:"For employers", navdash:"Impact dashboard",
      h1:"Your CV, in your own voice",
      lede:"Send a voice note on WhatsApp and get a professional CV in Arabic and English. No app to install, no forms, and no reading or typing required.",
      cta:"Start on WhatsApp", wa:"Or message us at",
      scvs:"CVs created", sreached:"people reached", sjobs:"jobs secured",
      howh:"How it works", hows:"Three steps, all inside WhatsApp.",
      s1h:"Send a voice note", s1p:"Talk about your work in your own dialect, like you'd tell a friend.",
      s2h:"We ask simple questions", s2p:"One at a time — your name, your trade, your experience, something you're proud of.",
      s3h:"Get your CV", s3p:"A bilingual PDF CV, ready to send to any employer.",
      whoh:"Who this is for", whos:"Workers with real experience who've never had a CV.",
      candh:"Workers", jobh:"Job families",
      cands:["Domestic workers","Drivers","Nannies","Salon technicians","Electricians","Plumbers","Cooks","Delivery riders","Security guards","Gardeners"],
      jobs:["Households & families","Transport & delivery","Hospitality & food","Maintenance & facilities","Salons & beauty","Retail & warehousing"],
      emph:"Hiring?", empp:"Browse available workers, read their ready-made CVs, and reach them through Naatiq.",
      empbtn:"Browse workers",
      foot:"Naatiq — voice-first CVs for workers who deserve to be heard." }
  };

  let lang = "ar", DATA = SNAPSHOT;

  async function fetchStats(){
    const r = await fetch(SUPABASE_URL + "/rest/v1/dashboard_stats?select=*", { headers:{ apikey: KEY } });
    if(!r.ok) throw new Error("stats " + r.status);
    const rows = await r.json();
    return rows[0] || SNAPSHOT;
  }

  function render(){
    const L = T[lang];
    document.documentElement.lang = lang;
    document.getElementById("wrap").setAttribute("dir", L.dir);
    const set = (id,v) => { document.getElementById(id).textContent = v; };
    set("t-lang", L.lang); set("t-navemp", L.navemp); set("t-navdash", L.navdash);
    set("t-h1", L.h1); set("t-lede", L.lede); set("t-cta", L.cta);
    set("t-wa", L.wa); set("t-num", "+" + WHATSAPP_NUMBER);
    set("t-scvs", L.scvs); set("t-sreached", L.sreached); set("t-sjobs", L.sjobs);
    set("t-howh", L.howh); set("t-hows", L.hows);
    set("t-s1h", L.s1h); set("t-s1p", L.s1p);
    set("t-s2h", L.s2h); set("t-s2p", L.s2p);
    set("t-s3h", L.s3h); set("t-s3p", L.s3p);
    set("t-whoh", L.whoh); set("t-whos", L.whos);
    set("t-candh", L.candh); set("t-jobh", L.jobh);
    set("t-emph", L.emph); set("t-empp", L.empp); set("t-empbtn", L.empbtn);
    set("t-foot", L.foot);

    document.getElementById("t-cta").href =
      "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(JOIN_CODE);

    document.getElementById("c-cands").innerHTML =
      L.cands.map(function(c){ return '<span class="chip">'+c+'</span>'; }).join("");
    document.getElementById("c-jobs").innerHTML =
      L.jobs.map(function(j){ return '<span class="chip em">'+j+'</span>'; }).join("");

    document.getElementById("s-cvs").textContent = DATA.total_cvs ?? 0;
    document.getElementById("s-reached").textContent = DATA.people_reached ?? 0;
    document.getElementById("s-jobs").textContent = DATA.placements ?? 0;
  }

  function toggleLang(){ lang = (lang === "ar" ? "en" : "ar"); render(); }

  render();
  fetchStats().then(function(s){ DATA = s; render(); }).catch(function(){ /* keep snapshot */ });
</script>
</body>
